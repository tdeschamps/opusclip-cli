name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # Pin to 1.25.x (not 1.26+): golangci-lint v2.5.0 is built with go1.25 and
  # panics type-checking code under a newer toolchain ("requires newer Go
  # version go1.26"). The minor floor is 1.25.11, which ships the patched
  # net/textproto (GO-2026-5039) and crypto/x509 (GO-2026-5037) that
  # govulncheck flags in earlier 1.25.x stdlib, and satisfies the module's
  # `go 1.25.0` requirement.
  GO_VERSION: "1.25.11"

jobs:
  test:
    name: lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@v0.7.0
          out=$(gofumpt -l ./internal ./cmd)
          if [ -n "$out" ]; then echo "gofumpt needed on:"; echo "$out"; exit 1; fi

      - name: vet
        run: go vet ./...

      - name: golangci-lint
        # Action v9 runs on Node 24; the linter is pinned via `version` below so
        # the toolchain stays compatible with this job's Go version.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: test (race)
        run: go test -race ./...

      - name: coverage gate
        run: make cover

      - name: upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: cover.out
        continue-on-error: true

  cross-compile:
    name: cross-compile smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/opusclip
