name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      # goreleaser's sboms block shells out to `syft`; install it on the runner.
      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@v0
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT for pushing the Homebrew cask to the separate tap repo
          # (the built-in GITHUB_TOKEN can't write cross-repo). See .goreleaser.yaml.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
