version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    groups:
      # Batch routine minor/patch bumps into one PR to cut noise; majors still
      # come as individual PRs so breaking changes get their own review.
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows. Catches deprecations (e.g. the Node 20
  # action runtime) and security updates without manual version chasing.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions:
        update-types:
          - minor
          - patch
